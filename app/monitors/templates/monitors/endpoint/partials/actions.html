<td class="text-right">
  <div class="flex justify-end items-center gap-2">
    <!-- CHECK NOW BUTTON (Hidden while checking to prevent double-clicks) -->
    {% if not is_checking %}
      <button hx-post="{% url 'check_endpoint' item.id %}" hx-indicator="#check-spinner-{{ item.id }}" hx-target="#endpoint-row-{{ item.id }}" hx-swap="outerHTML" class="btn btn-ghost btn-xs tooltip" data-tip="Check Now">
        <span id="check-spinner-{{ item.id }}" class="htmx-indicator loading loading-spinner loading-xs text-primary"></span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 htmx-dis-element" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
      </button>
    {% endif %}

    <div class="dropdown dropdown-left">
      <div tabindex="0" role="button" class="btn btn-ghost btn-sm btn-square">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-5 h-5 stroke-current">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"></path>
        </svg>
      </div>
      <ul tabindex="0" class="dropdown-content z-[1] menu p-2 shadow bg-base-100 rounded-box w-40 border border-base-300">
        <li>
          <a href="{% url 'endpoint_logs' %}?endpoint_id={{ item.id }}" hx-boost="true" hx-target="#main-content">View Logs</a>
        </li>
        <li>
          <button type="button" hx-get="{% url 'edit_endpoint' item.id %}" hx-target="#endpoint_modal_content" onclick="endpoint_modal.showModal()">Edit</button>
        </li>
        <li>
          <button type="button" onclick="delete_modal_{{ item.id }}.showModal()" class="text-error">Delete</button>
        </li>
      </ul>
    </div>
  </div>

  {% include 'monitors/endpoint/partials/delete_modal.html' %}
</td>
