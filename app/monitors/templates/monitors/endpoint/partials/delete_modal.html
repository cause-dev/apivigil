<dialog id="delete_modal_{{ item.id }}" class="modal">
  <div class="modal-box text-left">
    <h3 class="font-bold text-lg text-error">Delete object?</h3>
    <p class="py-4">
      Are you sure you want to delete <strong>{{ item.name }}</strong>?
    </p>
    <div class="modal-action">
      <button type="button" hx-delete="{% url 'delete_endpoint' item.id %}" hx-target="#poll-container" hx-swap="innerHTML" onclick="delete_modal_{{ item.id }}.close()" class="btn btn-error">Confirm Delete</button>
      <button type="button" onclick="delete_modal_{{ item.id }}.close()" class="btn btn-ghost">Cancel</button>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>
