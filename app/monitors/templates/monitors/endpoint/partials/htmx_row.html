<tr id="endpoint-row-{{ item.id }}" class="hover:bg-base-200/50 transition-colors"
{% if is_checking %}
hx-get="{% url 'check_endpoint' endpoint.id %}"
        hx-trigger="load delay:2s"
        hx-target="this"
        hx-swap="outerHTML"

{% endif %}
>
  <td>
    <div class="flex flex-col">
      <!-- Link the name to the detail view -->
      <a href="{% url 'endpoint' endpoint.id %}" hx-boost="true" hx-target="#main-content" hx-push-url="true" class="font-bold text-base hover:text-primary transition-colors cursor-pointer">{{ endpoint.name }}</a>
      <span class="text-xs opacity-50 font-mono">{{ endpoint.url|truncatechars:40 }}</span>
    </div>
  </td>

  {% include 'monitors/endpoint/partials/status.html' with item=endpoint %}

  {% include 'monitors/endpoint/partials/actions.html' with item=endpoint %}
</tr>
