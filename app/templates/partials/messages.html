<!-- templates/partials/messages.html -->
<div id="messages-list" {% if request.htmx %}hx-swap-oob="true"{% endif %}>
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags|default:'info' }} shadow-lg mb-4 flex justify-between items-center group transition-all">
        <div class="flex items-center gap-2">
          <!-- Icon (Optional: adds a professional touch) -->
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="stroke-current shrink-0 w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          <span class="font-medium">{{ message }}</span>
        </div>

        <!-- The Close Button -->
        <button type="button" 
                onclick="this.closest('.alert').remove()" 
                class="btn btn-ghost btn-xs btn-circle hover:bg-black/10">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    {% endfor %}

    <!-- Auto-hide script (keeps the UI clean if the user doesn't click) -->
    <script>
      setTimeout(() => {
        const list = document.getElementById('messages-list');
        if (list && list.innerHTML !== '') {
          list.style.opacity = '0';
          setTimeout(() => { list.innerHTML = ''; list.style.opacity = '1'; }, 500);
        }
      }, 5000);
    </script>
  {% endif %}
</div>
